<!DOCTYPE html>
<html>
<head>
<title>Network</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h2 {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  width: 220px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: #334155;
}

.name {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
}

.friends {
  font-size: 14px;
  color: #cbd5f5;
}
</style>

</head>

<body>

<h2>🌐 Network View</h2>
<p style="color:#cbd5f5;">View all users and their current connections.</p>
<button onclick="load()">🔄 Refresh Network</button>

<div class="container" id="r"></div>

<script>
async function load(){
  try{
    let res = await fetch("/network");
    let data = await res.json();

    let container = document.getElementById("r");
    container.innerHTML = "";

    for(let user in data){
      let friends = data[user].length ? data[user].join(", ") : "No friends yet";

      container.innerHTML += `
        <div class="card">
          <div class="name">👤 ${user}</div>
          <div class="friends">🤝 ${friends}</div>
        </div>
      `;
    }

  }catch(err){
    alert("Server not running ❌");
    console.log(err);
  }
}
</script>

</body>
</html>
