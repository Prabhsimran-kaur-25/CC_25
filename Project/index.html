<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 180px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 220px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: #334155;
}

.users {
  margin-top: 30px;
}

.user-card {
  background: #334155;
  margin: 5px auto;
  padding: 8px;
  width: 200px;
  border-radius: 8px;
}
a {
  color: white;
  text-decoration: none;
}

a:visited {
  color: white;
}

a:hover {
  color: #38bdf8;
}
</style>

</head>

<body>

<h1>🌐 Mini Social Network</h1>

<div class="stats">
  <div class="box">👥 Users: <span id="userCount">0</span></div>
  <div class="box">🔗 Connections: <span id="connCount">0</span></div>
</div>

<div class="container">
  <div class="card"><a href="add.html">➕ Add / Connect</a></div>
  <div class="card"><a href="network.html">🌐 View Network</a></div>
  <div class="card"><a href="mutual.html">🤝 Mutual</a></div>
  <div class="card"><a href="recommend.html">💡 Recommend</a></div>
  <div class="card"><a href="path.html">🛣️ Path</a></div>
</div>

<div class="users">
  <h2>📋 Registered Users</h2>
  <div id="userList"></div>
</div>

<script>
async function loadDashboard(){
  let res = await fetch("/network");
  let data = await res.json();

  let users = Object.keys(data);
  document.getElementById("userCount").innerText = users.length;

  let connections = 0;
  users.forEach(u => connections += data[u].length);
  document.getElementById("connCount").innerText = connections / 2;

  let list = document.getElementById("userList");
  list.innerHTML = "";

  users.forEach(u=>{
    list.innerHTML += `<div class="user-card">👤 ${u}</div>`;
  });
}

// auto load
loadDashboard();

// refresh every 3 sec
setInterval(loadDashboard, 3000);
</script>

</body>
</html>
