<h2>🤝 Mutual Friends</h2>
<p style="color:#cbd5f5;">See common friends shared between two users.</p>
<input id="u" placeholder="User 1">
<input id="v" placeholder="User 2">
<button onclick="go()">Find</button>

<div id="r"></div>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center;}
input, button { padding:10px; margin:5px; border-radius:8px; border:none;}
button { background:#22c55e; color:white; cursor:pointer;}
button:hover { background:#16a34a; }

.card {
  background:#1e293b;
  margin:10px auto;
  padding:10px;
  width:200px;
  border-radius:10px;
}
</style>

<script>
async function go(){
 let res=await fetch(`/mutual?u=${u.value}&v=${v.value}`);
 let d=await res.json();

 r.innerHTML="";
 d.forEach(x=>{
   r.innerHTML+=`<div class="card">👤 ${x}</div>`;
 });
}
</script>
